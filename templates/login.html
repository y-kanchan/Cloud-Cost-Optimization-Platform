{% extends "base.html" %}

{% block auth_content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-11 col-md-6 col-lg-5 col-xl-4 text-center">
            <div class="mb-5 auth-branding text-center">
                <i class="fas fa-cloud fa-4x text-galaxy glowing"></i>
                <h2 class="mt-3 text-galaxy">Cloud Cost Optimization</h2>
            </div>
            <div class="auth-card text-start">
                <div class="card-body">
                    <!-- Header -->
                    <div class="text-center mb-5">
                        <h1 class="h3 fw-bold mb-2">Welcome Back</h1>
                        <p class="text-secondary">Sign in to your account</p>
                    </div>
                    
                    <!-- Login Form -->
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-4">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" 
                                   id="username" 
                                   name="username" 
                                   class="form-control form-control-lg" 
                                   placeholder="Enter your username"
                                   required 
                                   autofocus>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" 
                                   id="password" 
                                   name="password" 
                                   class="form-control form-control-lg" 
                                   placeholder="Enter your password"
                                   required>
                        </div>
                        
                        <button type="submit" class="btn btn-galaxy btn-lg w-100 mb-4">
                            Sign In
                        </button>
                    </form>
                    
                    <!-- Footer Links -->
                    <div class="text-center">
                        <p class="text-secondary mb-0">
                            Don't have an account? 
                            <a href="{{ url_for('register') }}" class="text-galaxy fw-bold text-decoration-none">
                                Register here
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
