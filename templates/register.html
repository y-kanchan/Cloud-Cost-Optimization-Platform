{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-11 col-md-6 col-lg-5 col-xl-4 text-center">
            <div class="mb-5 auth-branding">
                <i class="fas fa-cloud fa-4x text-galaxy glowing"></i>
                <h2 class="mt-3 text-galaxy">NebulaCost</h2>
            </div>
            <div class="auth-card text-start">
                <div class="card-body">
                    <!-- Header -->
                    <div class="text-center mb-5">
                        <h1 class="h3 fw-bold mb-2">Create Account</h1>
                        <p class="text-secondary">Join the cosmic optimization mission</p>
                    </div>
                    
                    <!-- Register Form -->
                    <form method="POST" action="{{ url_for('register') }}">
                        <div class="mb-4">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" name="username" class="form-control form-control-lg" placeholder="Choose a username" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control form-control-lg" placeholder="Create a password" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-lg" placeholder="Repeat your password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-galaxy btn-lg w-100 mb-4">
                            Create Account
                        </button>
                    </form>
                    
                    <!-- Footer Links -->
                    <div class="text-center">
                        <p class="text-secondary mb-0">
                            Already have an account? 
                            <a href="{{ url_for('login') }}" class="text-galaxy fw-bold text-decoration-none">
                                Sign In
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    
    form.addEventListener('submit', function(e) {
        if (password.value !== confirmPassword.value) {
            e.preventDefault();
            alert('Passwords do not match. Please try again.');
            confirmPassword.focus();
        }
    });
});
</script>
{% endblock %}
