{% extends "base.html" %}

{% block content %}
    <div class="container-fluid p-4">
        <div class="row align-items-center mb-4">
            <div class="col">
                <h2 class="h4 mb-0">Resource Management</h2>
            </div>
            <div class="col-auto">
                <button class="btn btn-galaxy" data-bs-toggle="modal" data-bs-target="#addResourceModal">
                    <i class="fas fa-plus me-2"></i>Add Resource
                </button>
            </div>
        </div>
        <div class="dashboard-card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Hourly Rate</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for res in resources %}
                            <tr class="hover-galaxy">
                                <td>{{ res.name }}</td>
                                <td><span class="badge bg-purple">{{ res.type }}</span></td>
                                <td>${{ "%.4f"|format(res.hourly_rate) }}</td>
                                <td>
                                    <div class="btn-group">
                                        <button class="btn btn-outline-galaxy btn-sm me-2" data-bs-toggle="modal" data-bs-target="#editResourceModal{{ res.id }}">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <form action="{{ url_for('delete_resource', resource_id=res.id) }}" method="POST" class="d-inline">
                                            <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('Delete this resource?')">
                                                <i class="fas fa-trash-alt"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>

                            <!-- Edit Resource Modal -->
                            <div class="modal fade" id="editResourceModal{{ res.id }}" tabindex="-1" aria-hidden="true">
                                <div class="modal-dialog modal-dialog-centered">
                                    <div class="modal-content glass-modal border-secondary">
                                        <div class="modal-header border-secondary text-white">
                                            <h5 class="modal-title">Edit Resource: {{ res.name }}</h5>
                                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                        </div>
                                        <form action="{{ url_for('edit_resource', resource_id=res.id) }}" method="POST">
                                            <div class="modal-body text-white text-start">
                                                <div class="mb-3">
                                                    <label class="form-label">Resource Name</label>
                                                    <input type="text" name="name" class="form-control" value="{{ res.name }}" required>
                                                </div>
                                                <div class="mb-3">
                                                    <label class="form-label">Type</label>
                                                    <select name="type" class="form-select">
                                                        <option value="Compute" {% if res.type == 'Compute' %}selected{% endif %}>Compute</option>
                                                        <option value="Storage" {% if res.type == 'Storage' %}selected{% endif %}>Storage</option>
                                                        <option value="Database" {% if res.type == 'Database' %}selected{% endif %}>Database</option>
                                                        <option value="Network" {% if res.type == 'Network' %}selected{% endif %}>Network</option>
                                                    </select>
                                                </div>
                                                <div class="mb-3">
                                                    <label class="form-label">Hourly Rate ($)</label>
                                                    <input type="number" step="0.0001" name="hourly_rate" class="form-control" value="{{ res.hourly_rate }}" required>
                                                </div>
                                            </div>
                                            <div class="modal-footer border-secondary">
                                                <button type="button" class="btn btn-outline-galaxy" data-bs-dismiss="modal">Cancel</button>
                                                <button type="submit" class="btn btn-galaxy">Update Resource</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<!-- Add Resource Modal -->
<div class="modal fade" id="addResourceModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary">
            <div class="modal-header border-bottom-0">
                <h5 class="modal-title">Add New Resource</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Resource Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="e.g. EC2-XLarge">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Resource Type</label>
                        <select name="type" class="form-control" required>
                            <option value="Compute">Compute</option>
                            <option value="Storage">Storage</option>
                            <option value="Database">Database</option>
                            <option value="Networking">Networking</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hourly Rate ($)</label>
                        <input type="number" step="0.0001" name="hourly_rate" class="form-control" required placeholder="0.0000">
                    </div>
                </div>
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-galaxy">Save Resource</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
