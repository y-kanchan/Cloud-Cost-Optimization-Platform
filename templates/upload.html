{% extends "base.html" %}

{% block content %}
    <div class="container-fluid p-4">
        <div class="row align-items-center mb-4">
            <div class="col text-center">
                <h2 class="h4 mb-0">Upload Cosmic Data</h2>
            </div>
        </div>

    <div class="container-fluid p-4">
        <div class="row justify-content-center">
            <div class="col-xl-8">
                <div class="dashboard-card">
                    <div class="card-body p-5 text-center">
                        <div class="mb-4">
                            <i class="fas fa-cloud-upload-alt fa-5x text-galaxy glowing"></i>
                        </div>
                        <h1 class="h2 fw-bold mb-3">Launch Data Processing</h1>
                        <p class="text-light opacity-75 mb-5">Select a CSV file containing your cloud usage metrics.</p>
                        
                        <form method="POST" enctype="multipart/form-data">
                            <div class="mb-5">
                                <input class="form-control form-control-lg bg-dark border-secondary text-white" 
                                       type="file" 
                                       id="file" 
                                       name="file" 
                                       accept=".csv" 
                                       required>
                                <div class="mt-2 text-muted">Format: resource_name, resource_type, utilization_percent, usage_hours</div>
                            </div>
                            
                            <button type="submit" class="btn btn-galaxy btn-xl px-5 py-3">
                                <i class="fas fa-rocket me-2"></i>Analyze Data
                            </button>
                        </form>
                    </div>
                </div>

                <div class="row g-4 mt-2">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="card-body text-center">
                                <i class="fas fa-server fa-2x text-purple mb-2"></i>
                                <div class="small">resource_name</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="card-body text-center">
                                <i class="fas fa-layer-group fa-2x text-blue mb-2"></i>
                                <div class="small">resource_type</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="card-body text-center">
                                <i class="fas fa-chart-pie fa-2x text-pink mb-2"></i>
                                <div class="small">utilization %</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="card-body text-center">
                                <i class="fas fa-clock fa-2x text-galaxy mb-2"></i>
                                <div class="small">usage_hours</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
